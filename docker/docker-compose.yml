services:

  redis:
    image: redis:7-alpine
    container_name: speakwell-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: speakwell-backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/uploaded_audio:/app/uploaded_audio
      - ../backend/generated_audio:/app/generated_audio
      - whisper-cache:/root/.cache/whisper
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: speakwell-worker
    command: celery -A celery_app worker --loglevel=info --pool=solo
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/uploaded_audio:/app/uploaded_audio
      - ../backend/generated_audio:/app/generated_audio
      - whisper-cache:/root/.cache/whisper
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: speakwell-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  whisper-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "C:/Users/Siddhesh/.cache/whisper"